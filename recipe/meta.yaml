{% set name = "llama-cloud-services" %}
{% set version = "0.6.54" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/llama_cloud_services-{{ version }}.tar.gz
  sha256: baf65d9bffb68f9dca98ac6e22908b6675b2038b021e657ead1ffc0e43cbd45d

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - llama-parse = llama_cloud_services.parse.cli.main:parse

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - llama-cloud ==0.1.35
    - llama-index-core >=0.12.0
    - tenacity >=8.5.0,<10.0
    - platformdirs >=4.3.7,<5
    - pydantic >=2.8,!=2.10
    - click >=8.1.7,<9
    - python-dotenv >=1.0.1,<2

test:
  imports:
    - llama_cloud_services
  requires:
    - pip
  commands:
    - pip check
    - llama-parse --help

about:
  home: https://docs.cloud.llamaindex.ai
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: Tailored SDK clients for LlamaCloud services.
  description: |
    This package contains the code for hand-written SDKs and clients for
    interacting with LlamaCloud, such as LlamaParse, LlamaExtract,
    LlamaCloud Index.
  doc_url: https://docs.cloud.llamaindex.ai
  dev_url: https://github.com/run-llama/llama_cloud_services

extra:
  recipe-maintainers:
    - jan-janssen
